<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#26a69a">
    <title>学生服务平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        .nav-bar {
            background-color: #26a69a;
            display: flex;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .nav-bar .back {
            display: flex;
            align-items: center;
            color: white;
            font-size: 15px;
            padding: 14px 0;
            cursor: pointer;
            user-select: none;
        }
        .nav-bar .back::before {
            content: '';
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-right: 9px solid white;
            margin-right: 4px;
        }
        .nav-bar .nav-title {
            flex: 1;
            text-align: center;
            color: white;
            font-size: 17px;
            font-weight: 600;
            padding: 14px 0;
        }
        img {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
        }
        .container {
            position: relative;
            width: 100%;
        }
        .hidden-back-btn {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            height: 21%;
            z-index: 10;
            cursor: pointer;
            background: transparent;
            border: 1px solid transparent;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .hidden-back-btn:active,
        .hidden-back-btn:focus {
            background: transparent;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="hidden-back-btn" onclick="goBack()"></button>
        <img src="02.jpg" alt="学生请假">
    </div>
    <script>
        function goBack() {
            window.location.href = 'index(1).html';
        }
    </script>
</body>
</html>
