<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #F5F5F5;
            min-height: 100vh;
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
        }

        .browser-bar {
            background-color: #000000;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .browser-bar .close-btn {
            color: #FFFFFF;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
        }

        .browser-bar .title-wrap {
            text-align: center;
            flex: 1;
        }

        .browser-bar .title {
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
        }

        .browser-bar .domain {
            color: #999999;
            font-size: 12px;
            margin-top: 2px;
        }

        .browser-bar .more-btn {
            color: #FFFFFF;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
        }

        .nav-bar {
            background-color: #5DBDB6;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .nav-bar .back-btn {
            color: #FFFFFF;
            font-size: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .nav-bar .back-btn span {
            margin-left: 2px;
        }

        .nav-bar .nav-title {
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 600;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .content-card {
            background-color: #FFFFFF;
            margin: 12px;
            border-radius: 8px;
            overflow: hidden;
        }

        .info-row {
            display: flex;
            padding: 16px;
            border-bottom: 1px solid #EEEEEE;
            position: relative;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row .label {
            color: #333333;
            font-weight: 600;
            font-size: 15px;
            min-width: 80px;
        }

        .info-row .value {
            color: #666666;
            font-size: 15px;
            flex: 1;
            text-align: right;
        }

        .info-row .value-left {
            color: #666666;
            font-size: 15px;
            flex: 1;
            text-align: left;
        }

        .info-row .highlight {
            color: #4CAF50;
            font-weight: 600;
        }

        .stamp {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%) rotate(-15deg);
            width: 75px;
            height: 75px;
            opacity: 0.6;
        }

        .stamp svg,
        .stamp img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .process-row {
            display: flex;
            padding: 16px;
            border-bottom: 1px solid #EEEEEE;
            align-items: center;
            justify-content: space-between;
        }

        .process-row:last-child {
            border-bottom: none;
        }

        .process-row .label {
            color: #333333;
            font-weight: 600;
            font-size: 15px;
            min-width: 80px;
        }

        .process-content {
            flex: 1;
            display: flex;
            align-items: center;
            margin-left: 12px;
        }

        .process-left {
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #6B8DD6;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .avatar svg {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        .avatar .check {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background-color: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar .check svg {
            width: 12px;
            height: 12px;
            fill: #FFFFFF;
        }

        .process-info {
            margin-left: 12px;
        }

        .process-info .name {
            color: #333333;
            font-size: 15px;
            font-weight: 600;
        }

        .process-info .opinion {
            color: #999999;
            font-size: 13px;
            margin-top: 4px;
        }

        .process-time {
            color: #999999;
            font-size: 13px;
            flex-shrink: 0;
        }

        .full-image {
            width: 100%;
            display: block;
        }

        .full-image img {
            width: 100%;
            height: auto;
            display: block;
        }
         .hidden-back-btn {
            position: fixed;
            top: 15%;
            left: 10%;
            width: 400px;
            height: 150px;
            z-index: 999;
            cursor: pointer;
            background: transparent;
            border: 1px solid transparent;
            
        }
    </style>
</head>
<body>
     <button class="hidden-back-btn" onclick="goBack()"></button>
    <div class="full-image">
        <img src="01.jpg" alt="图片" />
    </div>

    <script>
        function goBack() {
            window.location.href = '01.html';
        }
    </script>
</body>
</html>
